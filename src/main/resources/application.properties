spring.application.name=inventory-order-management-api

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/orclpdb}
spring.datasource.username=${DB_USERNAME:inventory}
spring.datasource.password=${DB_PASSWORD:hr123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

server.error.include-message=always
server.error.include-stacktrace=never